name = "amby-api"
main = "src/worker.ts"
compatibility_date = "2025-09-27"
compatibility_flags = [
  "nodejs_compat",
  "nodejs_als",
  "nodejs_compat_populate_process_env",
]
upload_source_maps = true
alias = { playwright = "@cloudflare/playwright" }

# Enable workers.dev subdomain in production
workers_dev = true
# Disable preview deployments
preview_urls = false

# Custom domain routing
[[routes]]
pattern = "api.hiamby.com"
custom_domain = true

# Smart placement: run near the database
[placement]
mode = "smart"

# CPU limit — agent + LLM calls can be long
[limits]
cpu_ms = 300_000

# Observability
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
destinations = ["posthog-logs"]

[observability.traces]
enabled = false

# Version metadata binding
[version_metadata]
binding = "CF_VERSION_METADATA"

[browser]
binding = "BROWSER"
remote = true

# Hyperdrive connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "5b4f5571613141edbb3545c17bd44cdf"
localConnectionString = "postgresql://postgres:postgres@localhost:54322/postgres"

# --- Queue: inbound Telegram messages ---
[[queues.producers]]
binding = "TELEGRAM_QUEUE"
queue = "telegram-inbound"

[[queues.consumers]]
queue = "telegram-inbound"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "telegram-dlq"

[[queues.producers]]
binding = "TELEGRAM_DLQ"
queue = "telegram-dlq"

# --- Durable Object: ConversationSession ---
[durable_objects]
bindings = [
  { name = "CONVERSATION_SESSION", class_name = "ConversationSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["ConversationSession"]

# --- Workflow: AgentExecution ---
[[workflows]]
name = "agent-execution"
binding = "AGENT_WORKFLOW"
class_name = "AgentExecutionWorkflow"

[[workflows]]
name = "sandbox-provision"
binding = "SANDBOX_WORKFLOW"
class_name = "SandboxProvisionWorkflow"

# Task reconciliation + Telegram completion notifications
[triggers]
crons = ["*/5 * * * *"]

# Local dev
[dev]
port = 8787
