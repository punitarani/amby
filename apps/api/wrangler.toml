name = "amby-api"
main = "src/worker.ts"
compatibility_date = "2025-09-27"
compatibility_flags = [
  "nodejs_compat",
  "nodejs_als",
  "nodejs_compat_populate_process_env",
]
upload_source_maps = true
alias = { playwright = "@cloudflare/playwright" }

# Enable workers.dev subdomain in production
workers_dev = true
# Disable preview deployments
preview_urls = false

# Custom domain routing
[[routes]]
pattern = "api.hiamby.com"
custom_domain = true

# Smart placement: run near the database
[placement]
mode = "smart"

# CPU limit — agent + LLM calls can be long
[limits]
cpu_ms = 300_000

# Non-secret config with production defaults
[vars]
NODE_ENV = "production"
API_URL = "https://api.hiamby.com"
APP_URL = "https://hiamby.com"
DAYTONA_API_URL = "https://app.daytona.io/api"
DAYTONA_TARGET = "us"
SENTRY_ENVIRONMENT = "production"

# Required secrets — deploy will fail if any are missing
[secrets]
required = [
  "BETTER_AUTH_SECRET",
  "BETTER_AUTH_URL",
  "OPENROUTER_API_KEY",
  "CLOUDFLARE_ACCOUNT_ID",
  "CLOUDFLARE_AI_GATEWAY_ID",
  "CLOUDFLARE_AI_GATEWAY_BASE_URL",
  "CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN",
  "ATTACHMENTS_SIGNING_SECRET",
  "TELEGRAM_BOT_TOKEN",
  "TELEGRAM_WEBHOOK_SECRET",
  "DAYTONA_API_KEY",
  "COMPOSIO_API_KEY",
  "COMPOSIO_WEBHOOK_SECRET",
  "BRAINTRUST_API_KEY",
  "BRAINTRUST_PROJECT_ID",
  "SENTRY_DSN",
]

# Observability
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
destinations = ["posthog-logs"]

[observability.traces]
enabled = false

# Version metadata binding
[version_metadata]
binding = "CF_VERSION_METADATA"

[browser]
binding = "BROWSER"
remote = true

[ai]
binding = "AI"
remote = true

# Hyperdrive connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "5b4f5571613141edbb3545c17bd44cdf"
localConnectionString = "postgresql://postgres:postgres@localhost:54322/postgres"

[[r2_buckets]]
binding = "ATTACHMENTS_BUCKET"
bucket_name = "amby-attachments"

# --- Queue: inbound Telegram messages ---
[[queues.producers]]
binding = "TELEGRAM_QUEUE"
queue = "telegram-inbound"

[[queues.consumers]]
queue = "telegram-inbound"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "telegram-dlq"

[[queues.producers]]
binding = "TELEGRAM_DLQ"
queue = "telegram-dlq"

# --- Durable Objects: Amby runtime state ---
[durable_objects]
bindings = [
  { name = "AMBY_CONVERSATION", class_name = "AmbyConversation" },
  { name = "AMBY_CHAT_STATE", class_name = "AmbyChatState" }
]

[[migrations]]
tag = "v1"
new_classes = ["ConversationSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ChatStateDO"]

[[migrations]]
tag = "v3"
new_classes = ["AmbyConversation"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["AmbyChatState"]

# --- Workflow: AgentExecution ---
[[workflows]]
name = "amby-agent-execution"
binding = "AMBY_AGENT_EXECUTION"
class_name = "AmbyAgentExecution"

[[workflows]]
name = "amby-sandbox-provision"
binding = "AMBY_SANDBOX_PROVISION"
class_name = "AmbySandboxProvision"

[[workflows]]
name = "amby-volume-provision"
binding = "AMBY_VOLUME_PROVISION"
class_name = "AmbyVolumeProvision"

# Task reconciliation + Telegram completion notifications
[triggers]
crons = ["*/5 * * * *"]

# Local dev
[dev]
port = 8787
