name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Worker dry run
        run: cd apps/api && npx wrangler deploy --dry-run --outdir dist-worker

  # --- Production only (push to main) ---

  db-migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [format, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - name: Run migrations
        run: cd packages/db && bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [db-migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile

      - name: Prepare deployment metadata
        id: metadata
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n1)
          DEPLOY_TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${COMMIT_SHORT}"
          DEPLOY_MESSAGE="Deploy #${GITHUB_RUN_NUMBER} from ${GITHUB_REF_NAME} by ${GITHUB_ACTOR}: ${COMMIT_MSG}"
          echo "tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          echo "message=${DEPLOY_MESSAGE}" >> $GITHUB_OUTPUT

      - name: Upload Worker Version
        id: upload
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          packageManager: bun
          command: versions upload --message "${{ steps.metadata.outputs.message }}" --tag "${{ steps.metadata.outputs.tag }}"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
          DAYTONA_TARGET: ${{ secrets.DAYTONA_TARGET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ENABLE_CUA: ${{ secrets.ENABLE_CUA }}

      - name: Extract Version ID
        id: version
        run: |
          VERSION_ID=$(echo '${{ steps.upload.outputs.command-output }}' | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1)
          if [ -z "$VERSION_ID" ]; then
            echo "Failed to extract version ID from output:"
            echo '${{ steps.upload.outputs.command-output }}'
            exit 1
          fi
          echo "version_id=${VERSION_ID}" >> $GITHUB_OUTPUT

      - name: Deploy Worker Version
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          packageManager: bun
          command: versions deploy ${{ steps.version.outputs.version_id }} --percentage 100 --yes

      - name: Log deployment
        run: |
          echo "Deployed version ${{ steps.version.outputs.version_id }}"
          echo "Tag: ${{ steps.metadata.outputs.tag }}"
