# PR validation for docker/computer. Production build, push, and Daytona snapshot run in
# .github/workflows/ci-cd.yml (computer-image job) before Cloudflare deploy.

name: Computer Image

on:
  pull_request:
    paths:
      - "docker/computer/**"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/computer/**'

  build:
    name: Build (dry run)
    needs: changes
    if: needs.changes.outputs.docker_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: ./docker/computer/build.sh
