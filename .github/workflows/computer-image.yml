name: Computer Image

on:
  push:
    branches: [main]
    paths: ["docker/computer/**"]
  pull_request:
    paths: ["docker/computer/**"]

jobs:
  build:
    name: Build (dry run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: ./docker/computer/build.sh

  build-push-snapshot:
    name: Build, push & register snapshot
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: github-actions
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          ./docker/computer/build.sh
          ./docker/computer/push.sh
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - name: Register Daytona snapshot
        run: bun run computer:snapshot:create
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}
