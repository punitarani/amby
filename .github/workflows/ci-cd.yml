name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: "1"

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun test --coverage

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # Requires GitHub Actions secret `TURBO_TOKEN` and repository variable `TURBO_TEAM`.
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    # Requires GitHub Actions secret `TURBO_TOKEN` and repository variable `TURBO_TEAM`.
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Worker dry run
        run: |
          WORKER_VERSION_MESSAGE=$(cd apps/api && bun run --silent deploy:message) || exit 1
          test -n "$WORKER_VERSION_MESSAGE"
          test ${#WORKER_VERSION_MESSAGE} -le 100
          cd apps/api
          rm -rf dist-worker
          npx wrangler deploy --dry-run --outdir dist-worker --upload-source-maps --message "$WORKER_VERSION_MESSAGE"
          test -f dist-worker/worker.js
          test -f dist-worker/worker.js.map
          npx wrangler deploy dist-worker/worker.js --no-bundle --upload-source-maps --var SENTRY_RELEASE:"$GITHUB_SHA" --message "$WORKER_VERSION_MESSAGE" --dry-run
      - name: Validate deploy tooling
        run: |
          # @sentry/cli: local devDep of apps/api — must use scoped name with npx
          (cd apps/api && npx @sentry/cli --version)
          # @posthog/cli: not a local dep — npx auto-downloads
          npx @posthog/cli --version

          # Verify the checked-in Worker key lists stay usable for local runtime generation
          # and production Cloudflare secret sync.
          ENV_PATTERN=$(grep -v '^#' scripts/worker-env-keys.txt | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
          if [ -z "$ENV_PATTERN" ]; then
            echo "ERROR: scripts/worker-env-keys.txt produced an empty key pattern"
            exit 1
          fi
          SYNC_PATTERN=$(grep -v '^#' scripts/worker-cloudflare-sync-keys.txt | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
          if [ -z "$SYNC_PATTERN" ]; then
            echo "ERROR: scripts/worker-cloudflare-sync-keys.txt produced an empty key pattern"
            exit 1
          fi
          echo "Worker env key pattern: $ENV_PATTERN"
          echo "Cloudflare sync key pattern: $SYNC_PATTERN"

  # --- Production only (push to main) ---

  db-migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [format, lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: github-actions
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - uses: dopplerhq/cli-action@v3
      - name: Run migrations
        run: doppler run -- bash -c 'cd packages/db && bunx drizzle-kit migrate'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  computer-version:
    name: Computer version bump check
    runs-on: ubuntu-latest
    needs: [format, lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      bump: ${{ steps.filter.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - 'docker/computer/version.json'

  computer-image:
    name: Computer Docker image
    runs-on: ubuntu-latest
    needs: [computer-version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.computer-version.outputs.bump == 'true'
    environment: github-actions
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          ./docker/computer/build.sh
          ./docker/computer/push.sh
      - name: Register Daytona snapshot
        run: bun run computer:snapshot:create
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [db-migrate, computer-version, computer-image]
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.db-migrate.result == 'success' &&
      needs.computer-version.result == 'success' &&
      (needs.computer-image.result == 'skipped' || needs.computer-image.result == 'success')
    environment: cloudflare-workers
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile

      - name: Prepare deployment metadata
        id: metadata
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          DEPLOY_TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${COMMIT_SHORT}"
          DEPLOY_MESSAGE=$(cd apps/api && bun run --silent deploy:message) || exit 1
          test -n "$DEPLOY_MESSAGE"
          test ${#DEPLOY_MESSAGE} -le 100
          {
            echo "tag=${DEPLOY_TAG}"
            echo "message=${DEPLOY_MESSAGE}"
          } >> "$GITHUB_OUTPUT"

      - uses: dopplerhq/cli-action@v3

      - name: Sync secrets to Cloudflare
        run: |
          PATTERN=$(grep -v '^#' scripts/worker-cloudflare-sync-keys.txt | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
          doppler secrets download --no-file --format json | \
            jq -c --arg p "^($PATTERN)$" 'with_entries(select(.key | test($p)))' | \
            (cd apps/api && npx wrangler secret bulk)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Worker bundle for source maps
        run: |
          cd apps/api
          rm -rf dist-worker
          npx wrangler deploy --dry-run --outdir dist-worker --upload-source-maps --var SENTRY_RELEASE:"$GITHUB_SHA" --message "${{ steps.metadata.outputs.message }}"
          test -f dist-worker/worker.js
          test -f dist-worker/worker.js.map
        env:
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Inject and upload PostHog source maps
        run: |
          doppler run -- bash -lc '
            set -euo pipefail
            cd apps/api
            # PostHog inject intentionally mutates the built worker.js bundle to stamp chunk IDs.
            # The injected dist-worker artifact is the exact bundle deployed below with `wrangler deploy --no-bundle`.
            npx @posthog/cli sourcemap inject \
              --directory dist-worker \
              --release-name amby-api \
              --release-version "$GITHUB_SHA"
            npx @posthog/cli sourcemap upload \
              --directory dist-worker \
              --release-name amby-api \
              --release-version "$GITHUB_SHA"
          '
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          POSTHOG_CLI_HOST: https://us.posthog.com

      - name: Upload Sentry source maps
        run: |
          doppler run -- bash -lc '
            set -euo pipefail
            cd apps/api
            test -f dist-worker/worker.js
            test -f dist-worker/worker.js.map
            export SENTRY_RELEASE="$GITHUB_SHA"
            if ! npx @sentry/cli releases info "$SENTRY_RELEASE" >/dev/null 2>&1; then
              npx @sentry/cli releases new "$SENTRY_RELEASE"
            fi
            npx @sentry/cli sourcemaps upload \
              --release "$SENTRY_RELEASE" \
              --strip-prefix "$PWD" \
              dist-worker
            npx @sentry/cli releases finalize "$SENTRY_RELEASE"
          '
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy Worker
        run: |
          cd apps/api
          test -f dist-worker/worker.js
          test -f dist-worker/worker.js.map
          # `wrangler versions upload --no-bundle` publishes only the prebuilt script artifact and
          # skips the config-driven deployment shape that registers Workflows declared in wrangler.toml.
          # Deploy the PostHog-injected bundle through `wrangler deploy` so workflow resources and
          # bindings are applied from config while preserving the exact artifact we uploaded source maps for.
          npx wrangler deploy dist-worker/worker.js \
            --no-bundle \
            --upload-source-maps \
            --var SENTRY_RELEASE:"$GITHUB_SHA" \
            --message "${{ steps.metadata.outputs.message }}" \
            --tag "${{ steps.metadata.outputs.tag }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify Workflow Resources
        run: |
          set -euo pipefail
          while IFS='=' read -r workflow class_name; do
            [ -n "$workflow" ] || continue
            response=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workflows/$workflow")
            echo "$response" | jq -e --arg workflow "$workflow" --arg class_name "$class_name" '
              .success == true and
              .result.name == $workflow and
              .result.script_name == "amby-api" and
              .result.class_name == $class_name
            ' >/dev/null
            echo "Verified workflow resource: $workflow"
          done <<'EOF'
          sandbox-provision=SandboxProvisionWorkflow
          volume-provision=VolumeProvisionWorkflow
          agent-execution=AgentExecutionWorkflow
          EOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Log deployment
        run: |
          echo "Deployed worker amby-api"
          echo "Tag: ${{ steps.metadata.outputs.tag }}"
