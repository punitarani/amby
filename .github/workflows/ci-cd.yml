name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: "1"

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # Requires GitHub Actions secret `TURBO_TOKEN` and repository variable `TURBO_TEAM`.
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    # Requires GitHub Actions secret `TURBO_TOKEN` and repository variable `TURBO_TEAM`.
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Worker dry run
        run: |
          cd apps/api
          rm -rf dist-worker
          npx wrangler versions upload --dry-run --outdir dist-worker
          test -f dist-worker/worker.js
          npx wrangler versions upload dist-worker/worker.js --no-bundle --upload-source-maps --dry-run

      - name: Validate deploy tooling
        run: |
          # @sentry/cli: local devDep of apps/api — must use scoped name with npx
          (cd apps/api && npx @sentry/cli --version)
          # @posthog/cli: not a local dep — npx auto-downloads
          npx @posthog/cli --version

          # Verify worker-env-keys.txt produces a non-empty key pattern
          PATTERN=$(grep -v '^#' scripts/worker-env-keys.txt | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
          if [ -z "$PATTERN" ]; then
            echo "ERROR: scripts/worker-env-keys.txt produced an empty key pattern"
            exit 1
          fi
          echo "Env key pattern: $PATTERN"

  # --- Production only (push to main) ---

  db-migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [format, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: github-actions
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - uses: dopplerhq/cli-action@v3
      - name: Run migrations
        run: doppler run -- bash -c 'cd packages/db && bunx drizzle-kit migrate'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  computer-version:
    name: Computer version bump check
    runs-on: ubuntu-latest
    needs: [format, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      bump: ${{ steps.filter.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - 'docker/computer/version.json'

  computer-image:
    name: Computer Docker image
    runs-on: ubuntu-latest
    needs: [computer-version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.computer-version.outputs.bump == 'true'
    environment: github-actions
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          ./docker/computer/build.sh
          ./docker/computer/push.sh
      - name: Register Daytona snapshot
        run: bun run computer:snapshot:create
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [db-migrate, computer-version, computer-image]
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.db-migrate.result == 'success' &&
      needs.computer-version.result == 'success' &&
      (needs.computer-image.result == 'skipped' || needs.computer-image.result == 'success')
    environment: cloudflare-workers
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile

      - name: Prepare deployment metadata
        id: metadata
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n1)
          DEPLOY_TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${COMMIT_SHORT}"
          DEPLOY_MESSAGE="Deploy #${GITHUB_RUN_NUMBER} from ${GITHUB_REF_NAME} by ${GITHUB_ACTOR}: ${COMMIT_MSG}"
          echo "tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          echo "message=${DEPLOY_MESSAGE}" >> $GITHUB_OUTPUT

      - uses: dopplerhq/cli-action@v3

      - name: Sync secrets to Cloudflare
        run: |
          PATTERN=$(grep -v '^#' scripts/worker-env-keys.txt | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
          doppler secrets download --no-file --format json | \
            jq -c --arg p "^($PATTERN)$" 'with_entries(select(.key | test($p)))' | \
            (cd apps/api && npx wrangler secret bulk)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Worker bundle for source maps
        run: |
          cd apps/api
          rm -rf dist-worker
          npx wrangler versions upload --dry-run --outdir dist-worker --var SENTRY_RELEASE:"$GITHUB_SHA"
          test -f dist-worker/worker.js
        env:
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Inject and upload PostHog source maps
        run: |
          doppler run -- bash -lc '
            set -euo pipefail
            cd apps/api
            # PostHog inject intentionally mutates the built worker.js bundle to stamp chunk IDs.
            # The injected dist-worker artifact is the exact bundle deployed below with --no-bundle.
            npx @posthog/cli sourcemap inject \
              --directory dist-worker \
              --release-name amby-api \
              --release-version "$GITHUB_SHA"
            npx @posthog/cli sourcemap upload \
              --directory dist-worker \
              --release-name amby-api \
              --release-version "$GITHUB_SHA"
          '
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          POSTHOG_CLI_HOST: https://us.posthog.com

      - name: Upload Sentry source maps
        run: |
          doppler run -- bash -lc '
            set -euo pipefail
            cd apps/api
            test -f dist-worker/worker.js
            test -f dist-worker/worker.js.map
            export SENTRY_RELEASE="$GITHUB_SHA"
            if ! npx @sentry/cli releases info "$SENTRY_RELEASE" >/dev/null 2>&1; then
              npx @sentry/cli releases new "$SENTRY_RELEASE"
            fi
            npx @sentry/cli sourcemaps upload \
              --release "$SENTRY_RELEASE" \
              --strip-prefix "$PWD" \
              dist-worker
            npx @sentry/cli releases finalize "$SENTRY_RELEASE"
          '
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload Worker Version
        id: upload
        run: |
          cd apps/api
          test -f dist-worker/worker.js
          OUTPUT=$(npx wrangler versions upload dist-worker/worker.js \
            --no-bundle \
            --upload-source-maps \
            --var SENTRY_RELEASE:"$GITHUB_SHA" \
            --message "${{ steps.metadata.outputs.message }}" \
            --tag "${{ steps.metadata.outputs.tag }}" 2>&1)
          echo "$OUTPUT"
          echo "command-output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Extract Version ID
        id: version
        env:
          UPLOAD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          VERSION_ID=$(echo "$UPLOAD_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1)
          if [ -z "$VERSION_ID" ]; then
            echo "Failed to extract version ID"
            echo "$UPLOAD_OUTPUT"
            exit 1
          fi
          echo "version_id=${VERSION_ID}" >> $GITHUB_OUTPUT

      - name: Deploy Worker Version
        run: |
          cd apps/api
          npx wrangler versions deploy ${{ steps.version.outputs.version_id }} --percentage 100 --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Log deployment
        run: |
          echo "Deployed version ${{ steps.version.outputs.version_id }}"
          echo "Tag: ${{ steps.metadata.outputs.tag }}"
