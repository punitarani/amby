name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: "1"

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Worker dry run
        run: cd apps/api && npx wrangler deploy --dry-run --outdir dist-worker

  # --- Production only (push to main) ---

  db-migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [format, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile
      - uses: dopplerhq/cli-action@v3
      - name: Run migrations
        run: doppler run -- bash -c 'cd packages/db && bunx drizzle-kit migrate'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [db-migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install --frozen-lockfile

      - name: Prepare deployment metadata
        id: metadata
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n1)
          DEPLOY_TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${COMMIT_SHORT}"
          DEPLOY_MESSAGE="Deploy #${GITHUB_RUN_NUMBER} from ${GITHUB_REF_NAME} by ${GITHUB_ACTOR}: ${COMMIT_MSG}"
          echo "tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          echo "message=${DEPLOY_MESSAGE}" >> $GITHUB_OUTPUT

      - uses: dopplerhq/cli-action@v3

      - name: Upload Worker Version
        id: upload
        run: |
          cd apps/api
          OUTPUT=$(doppler run -- npx wrangler versions upload \
            --message "${{ steps.metadata.outputs.message }}" \
            --tag "${{ steps.metadata.outputs.tag }}" 2>&1)
          echo "$OUTPUT"
          echo "command-output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Extract Version ID
        id: version
        env:
          UPLOAD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          VERSION_ID=$(echo "$UPLOAD_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1)
          if [ -z "$VERSION_ID" ]; then
            echo "Failed to extract version ID"
            echo "$UPLOAD_OUTPUT"
            exit 1
          fi
          echo "version_id=${VERSION_ID}" >> $GITHUB_OUTPUT

      - name: Deploy Worker Version
        run: |
          cd apps/api
          npx wrangler versions deploy ${{ steps.version.outputs.version_id }} --percentage 100 --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Log deployment
        run: |
          echo "Deployed version ${{ steps.version.outputs.version_id }}"
          echo "Tag: ${{ steps.metadata.outputs.tag }}"
